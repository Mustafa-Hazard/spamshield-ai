{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-lg-6">
    <h5 class="section-title"><i class="fas fa-plus-circle"></i>Add Record</h5>
    <div class="cyber-card">
      <form method="POST">
        <div class="mb-3">
          <label class="form-label"><i class="fas fa-envelope me-1"></i>Email Content</label>
          <textarea class="form-control" name="email_text" rows="6"
            placeholder="Enter email text..." required></textarea>
        </div>
        <div class="mb-4">
          <label class="form-label"><i class="fas fa-tag me-1"></i>Label</label>
          <select class="form-select" name="result" required>
            <option value="">-- Select verdict --</option>
            <option value="SPAM">SPAM</option>
            <option value="HAM">HAM</option>
          </select>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-cyber"><i class="fas fa-save me-1"></i>SAVE</button>
          <a href="/records" class="btn btn-outline-cyber">CANCEL</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
